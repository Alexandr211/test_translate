services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: translator_php
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DB_DSN: mysql:host=mysql;dbname=translator_crm
      DB_USER: app
      DB_PASSWORD: app
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: translator_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    container_name: translator_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: translator_crm
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
version: '3.2'

services:

  frontend:
    build: frontend
    ports:
      - 20080:80
    volumes:
      # Re-use local composer cache via host-volume
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      # Mount source-code for development
      - ./:/app

  backend:
    build: backend
    ports:
      - 21080:80
    volumes:
      # Re-use local composer cache via host-volume
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      # Mount source-code for development
      - ./:/app

  mysql:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=verysecret
      - MYSQL_DATABASE=yii2advanced
      - MYSQL_USER=yii2advanced
      - MYSQL_PASSWORD=secret

